version: '3.9'

services:
  # ── Backend API ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmestudos-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-pmestudos-change-this-secret-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - DB_PATH=/app/data/pmestudos.db
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    networks:
      - pmnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (React build served by Nginx) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api
    container_name: pmestudos-frontend
    restart: unless-stopped
    networks:
      - pmnet
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: pmestudos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_logs:/var/log/nginx
    networks:
      - pmnet
    depends_on:
      - frontend
      - backend

volumes:
  backend_data:
  backend_uploads:
  nginx_certs:
  nginx_logs:

networks:
  pmnet:
    driver: bridge
